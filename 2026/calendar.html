    <meta

  <body>
    <div class="cardWrapper">
      <!-- 導覽列 -->
      <ul class="nav nav-pills nav-fill">
        <li class="nav-item">
          <a class="nav-link" href="index.html">卡片與守則</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="calendar.html">社群月曆</a>

        <li class="nav-item">
          <a class="nav-link" href="rewards.html">集章獎勵</a>

        <li class="nav-item">
          <a class="nav-link" href="communities.html">社群介紹</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="sponsors.html">贊助商</a>
        </li>
      </ul>

      <div class="card" id="calendar-nav" style="margin-bottom: 12px">
        <div class="title-box" style="padding-bottom: 8px">
          <h1 class="title">
            <span class="specialColor">高雄軟體社群活動</span>
          </h1>
          <div class="calendar-nav">
            <h2
              class="title mb-0"
              id="calendar-title-date"
              style="text-align: left; margin: 0"
            ></h2>
            <div style="display: flex; align-items: center; gap: 8px">
              <span
                id="event-count-text"
                style="
                  font-weight: bold;
                  color: #666;
                  font-size: 0.9rem;
                  margin-right: 8px;
                "
              ></span>
              <div class="btn-group" role="group">
                <button
                  id="view-calendar-btn"
                  class="btn btn-outline-primary btn-sm"
                  style="
                    width: 32px;
                    height: 32px;
                    padding: 0;
                    display: inline-flex;
                    align-items: center;
                    justify-content: center;
                  "
                  title="月曆檢視"
                >
                  <i class="fa-solid fa-calendar-days"></i>
                </button>
                <button
                  id="view-list-btn"
                  class="btn btn-outline-primary btn-sm"
                  style="
                    width: 32px;
                    height: 32px;
                    padding: 0;
                    display: inline-flex;
                    align-items: center;
                    justify-content: center;
                  "
                  title="清單檢視"
                >
                  <i class="fa-solid fa-list"></i>
                </button>
              </div>
              <div class="btn-group" role="group">
                <button
                  id="prev-month"
                  class="btn btn-outline-secondary btn-sm"
                  style="
                    width: 32px;
                    height: 32px;
                    padding: 0;
                    display: inline-flex;
                    align-items: center;
                    justify-content: center;
                  "
                  title="上個月"
                >
                  <i class="fa-solid fa-chevron-left"></i>
                </button>
                <button
                  id="next-month"
                  class="btn btn-outline-secondary btn-sm"
                  style="
                    width: 32px;
                    height: 32px;
                    padding: 0;
                    display: inline-flex;
                    align-items: center;
                    justify-content: center;
                  "
                  title="下個月"
                >
                  <i class="fa-solid fa-chevron-right"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div id="calendar-layout">
          <div id="calendar-root" class="calendar-container">
            <!-- Calendar will be rendered here -->
            <div class="text-center p-3">載入活動中...</div>
          </div>

          <script>
            document.addEventListener("DOMContentLoaded", function () {
              const titleDateSpan = document.getElementById(
                "calendar-title-date",
              );
              const prevBtn = document.getElementById("prev-month");
              const nextBtn = document.getElementById("next-month");
              const viewCalendarBtn =
                document.getElementById("view-calendar-btn");
              const viewListBtn = document.getElementById("view-list-btn");
              const calendarRoot = document.getElementById("calendar-root");
              const eventListCard = document.getElementById("event-list-card");
              const eventCountText =
                document.getElementById("event-count-text");

              let showCalendar = window.innerWidth > 768; // Default desktop: calendar, mobile: list

              function updateView() {
                if (showCalendar) {
                  calendarRoot.style.display = "block";
                  eventListCard.style.display = "none";
                  viewCalendarBtn.classList.add("active");
                  viewListBtn.classList.remove("active");
                } else {
                  calendarRoot.style.display = "none";
                  eventListCard.style.display = "block";
                  viewListBtn.classList.add("active");
                  viewCalendarBtn.classList.remove("active");
                }
              }

              viewCalendarBtn.addEventListener("click", () => {
                showCalendar = true;
                updateView();
              });

              viewListBtn.addEventListener("click", () => {
                showCalendar = false;
                updateView();
              });

              // Apply initial view
              updateView();

              // Initialize with current date
              let currentDate = new Date();
              let currentYear = currentDate.getFullYear();
              let currentMonth = currentDate.getMonth(); // 0-indexed
              let allEvents = [];

              // Fetch events once
              fetch("events.json")
                .then((response) => response.json())
                .then((events) => {
                  allEvents = events;
                  renderCalendar();
                })
                .catch((error) => {
                  console.error("Error loading events:", error);
                  calendarRoot.innerHTML =
                    '<div class="text-center p-3 text-danger">無法載入活動資料</div>';
                });

              // Event Listeners for Navigation
              prevBtn.addEventListener("click", () => {
                currentMonth--;
                if (currentMonth < 0) {
                  currentMonth = 11;
                  currentYear--;
                }
                renderCalendar();
              });

              nextBtn.addEventListener("click", () => {
                currentMonth++;
                if (currentMonth > 11) {
                  currentMonth = 0;
                  currentYear++;
                }
                renderCalendar();
              });

              function renderCalendar() {
                // Update Title
                titleDateSpan.textContent = `${currentYear} 年 ${currentMonth + 1} 月`;

                const daysOfWeek = [
                  "週一",
                  "週二",
                  "週三",
                  "週四",
                  "週五",
                  "週六",
                  "週日",
                ];

                // First day of the month
                const firstDay = new Date(currentYear, currentMonth, 1);
                // Day of week for the 1st
                let startDay = firstDay.getDay();
                // Adjust for Monday start (0=Mon, 6=Sun)
                startDay = startDay === 0 ? 6 : startDay - 1;

                // Days in month
                const daysInMonth = new Date(
                  currentYear,
                  currentMonth + 1,
                  0,
                ).getDate();

                let html = '<div class="calendar-header">';
                daysOfWeek.forEach((day) => {
                  html += `<div>${day}</div>`;
                });
                html += '</div><div class="calendar-grid">';

                // Empty cells before start
                for (let i = 0; i < startDay; i++) {
                  html += '<div class="calendar-day empty"></div>';
                }

                // Days
                for (let day = 1; day <= daysInMonth; day++) {
                  const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;

                  // Calculate day of week (0=Sunday, 6=Saturday)
                  const currentDateObj = new Date(
                    currentYear,
                    currentMonth,
                    day,
                  );
                  const dayOfWeek = currentDateObj.getDay();
                  const isSaturday = dayOfWeek === 6;
                  const isSunday = dayOfWeek === 0;
                  const isWeekend = isSaturday || isSunday;

                  // Check if we need top border (if previous week same day is not weekend or doesn't exist)
                  let needTopBorder = false;
                  if (isWeekend) {
                    if (day <= 7) {
                      // First week, always need top border
                      needTopBorder = true;
                    } else {
                      // Check previous week same day
                      const prevWeekDay = day - 7;
                      const prevWeekDate = new Date(
                        currentYear,
                        currentMonth,
                        prevWeekDay,
                      );
                      const prevWeekDayOfWeek = prevWeekDate.getDay();
                      const prevWeekIsWeekend =
                        prevWeekDayOfWeek === 0 || prevWeekDayOfWeek === 6;
                      needTopBorder = !prevWeekIsWeekend;
                    }
                  }

                  const weekendClass = isSaturday
                    ? " saturday"
                    : isSunday
                      ? " sunday"
                      : "";
                  const topBorderClass = needTopBorder ? " weekend-top" : "";

                  // Find events for this day
                  const dayEvents = allEvents.filter((e) => e.date === dateStr);

                  html += `<div class="calendar-day${weekendClass}${topBorderClass}">
                                <span class="date-number">${day}</span>`;

                  if (dayEvents.length > 0) {
                    dayEvents.forEach((event) => {
                      const linkStart =
                        event.link && event.link !== "#"
                          ? `<a href="${event.link}" target="_blank">`
                          : "<div>";
                      const linkEnd =
                        event.link && event.link !== "#" ? "</a>" : "</div>";
                      const colorStyle = event.color
                        ? `style="color: ${event.color};"`
                        : "";
                      const borderStyle = event.color
                        ? `style="border-left-color: ${event.color};"`
                        : "";

                      html += `<div class="day-event" ${borderStyle}>
                                        ${linkStart}
                                            <div class="event-community" ${colorStyle}>${event.community}</div>
                                            <div class="event-name">${event.title}</div>
                                            ${event.description ? `<div class="event-details-small">${event.description}</div>` : ""}
                                        ${linkEnd}
                                    </div>`;
                    });
                  }

                  html += `</div>`;
                }

                // Fill remaining grid
                const totalCells = startDay + daysInMonth;
                const remaining = 7 - (totalCells % 7);
                if (remaining < 7) {
                  for (let i = 0; i < remaining; i++) {
                    html += '<div class="calendar-day empty"></div>';
                  }
                }

                html += "</div>";
                calendarRoot.innerHTML = html;
                renderEventList();
              }

              // ── 本月活動列表工具函式 ──────────────────────────

              let currentMonthEvents = [];

              function getGoogleCalendarURL(event) {
                const start = event.date.replace(/-/g, "");
                const nextDay = new Date(event.date + "T00:00:00");
                nextDay.setDate(nextDay.getDate() + 1);
                const end = nextDay
                  .toISOString()
                  .slice(0, 10)
                  .replace(/-/g, "");
                const text = encodeURIComponent(
                  event.title
                    ? `${event.community} - ${event.title}`
                    : event.community,
                );
                const descParts = [];
                if (event.description)
                  descParts.push(
                    event.description.replace(/<br\s*\/?>/gi, "\n"),
                  );
                if (event.link && event.link !== "#")
                  descParts.push("活動連結：" + event.link);
                const details = encodeURIComponent(descParts.join("\n"));
                return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${start}/${end}&details=${details}`;
              }

              function downloadICS(index) {
                const event = currentMonthEvents[index];
                const start = event.date.replace(/-/g, "");
                const nextDay = new Date(event.date + "T00:00:00");
                nextDay.setDate(nextDay.getDate() + 1);
                const end = nextDay
                  .toISOString()
                  .slice(0, 10)
                  .replace(/-/g, "");
                const summary = event.title
                  ? `${event.community} - ${event.title}`
                  : event.community;
                const descParts = [];
                if (event.description)
                  descParts.push(
                    event.description.replace(/<br\s*\/?>/gi, "\\n"),
                  );
                if (event.link && event.link !== "#")
                  descParts.push("活動連結：" + event.link);
                const lines = [
                  "BEGIN:VCALENDAR",
                  "VERSION:2.0",
                  "PRODID:-//Community Card Org//高雄社群活動//ZH",
                  "BEGIN:VEVENT",
                  `UID:${event.date}-${encodeURIComponent(event.community)}@community-card.org`,
                  `DTSTART;VALUE=DATE:${start}`,
                  `DTEND;VALUE=DATE:${end}`,
                  `SUMMARY:${summary}`,
                ];
                if (descParts.length)
                  lines.push(`DESCRIPTION:${descParts.join("\\n")}`);
                if (event.link && event.link !== "#")
                  lines.push(`URL:${event.link}`);
                lines.push("END:VEVENT", "END:VCALENDAR");
                const blob = new Blob([lines.join("\r\n")], {
                  type: "text/calendar;charset=utf-8",
                });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `${event.date}-${event.community}.ics`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
              }

              function renderEventList() {
                const listRoot = document.getElementById("event-list-root");
                const monthEvents = allEvents
                  .filter((e) => {
                    const [y, m] = e.date.split("-").map(Number);
                    return y === currentYear && m === currentMonth + 1;
                  })
                  .sort((a, b) => a.date.localeCompare(b.date));
                currentMonthEvents = monthEvents;

                // Update total events count
                if (eventCountText) {
                  eventCountText.textContent = `共 ${monthEvents.length} 場`;
                }

                if (monthEvents.length === 0) {
                  listRoot.innerHTML =
                    '<p class="text-muted text-center py-3">本月暫無活動資料</p>';
                  return;
                }

                let html = `<div class="list-header" style="display:none;">${currentMonth + 1} 月活動（共 ${monthEvents.length} 場）</div>`;
                html +=
                  '<p style="font-size:0.85rem;color:#666;margin-bottom:10px;">點擊按鈕可將活動加入手機行事曆</p>';
                html +=
                  '<div class="table-responsive"><table class="table table-sm table-hover mb-0">';
                html +=
                  '<thead><tr><th>#</th><th>日期</th><th class="col-weekday">星期</th><th>活動</th><th><span class="d-none d-sm-inline">加入</span>行事曆</th></tr></thead>';
                html += "<tbody>";
                monthEvents.forEach((event, i) => {
                  const [y, m, d] = event.date.split("-");
                  const dayOfWeek = new Date(
                    parseInt(y),
                    parseInt(m) - 1,
                    parseInt(d),
                  ).getDay();
                  const weekNames = ["日", "一", "二", "三", "四", "五", "六"];
                  const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                  const dateColor = isWeekend ? "color:#e53e3e;" : "";
                  const dateLabel = `<span style="${dateColor}">${m}/${d}</span>`;
                  const weekLabel = `<span style="${dateColor}">週${weekNames[dayOfWeek]}</span>`;
                  const dot = `<span class="community-dot" style="background:${event.color || "#666"};"></span>`;
                  const googleURL = getGoogleCalendarURL(event);

                  const eventLinkStart =
                    event.link && event.link !== "#"
                      ? `<a href="${event.link}" target="_blank" style="text-decoration:none;color:inherit;font-weight:bold;text-decoration:underline;">`
                      : "";
                  const eventLinkEnd =
                    event.link && event.link !== "#" ? `</a>` : "";

                  html += `<tr>
                                <td style="white-space:nowrap;color:#999;">${i + 1}</td>
                                <td style="white-space:nowrap;">${dateLabel}<span class="weekday-mobile" style="${dateColor}">週${weekNames[dayOfWeek]}</span></td>
                                <td class="col-weekday" style="white-space:nowrap;">${weekLabel}</td>
                                <td><div style="display:flex;align-items:flex-start;gap:6px;">${dot}<div><strong>${event.community}</strong>${event.title ? `<div style="color:#555;margin-top:2px;">${eventLinkStart}${event.title}${eventLinkEnd}</div>` : ""}${event.description ? `<div style="font-size:0.8rem;color:#777;margin-top:4px;line-height:1.4;">${event.description}</div>` : ""}</div></div></td>
                                <td style="white-space:nowrap;">
                                    <div class="btn-cal-group">
                                        <a href="${googleURL}" target="_blank" class="btn btn-outline-primary btn-cal">Google</a>
                                        <button class="btn btn-outline-secondary btn-cal" onclick="downloadICS(${i})">下載</button>
                                    </div>
                                </td>
                            </tr>`;
                });
                html += "</tbody></table></div>";
                listRoot.innerHTML = html;
              }

              // 將 downloadICS 暴露至全域，供 onclick 使用
              window.downloadICS = downloadICS;
            });
          </script>

          <div id="event-list-card">
            <div id="event-list-root">
              <div class="text-center p-3 text-muted">載入活動中...</div>
            </div>
          </div>
        </div>
        <p
          style="
            text-align: right;
            font-size: 0.8rem;
            color: #666;
            margin-top: 8px;
          "
        >
          * 實際活動資訊依照主辦單位提供資訊為準
        </p>
      </div>
    </div>
  </body>
