    <div class="cardWrapper">

        </li>

          <a class="nav-link" href="sponsors.html">贊助商</a>
        </li>
      </ul>

      <div class="card">
        <div class="title-box">
          <h1 class="title">集章獎勵</h1>
          <p class="subtitle">這裡匯集了高雄社群名牌卡有集章獎勵的社群</p>
        </div>
        <div class="divider"></div>

        <div id="rewards-list">
          <!-- Data will be loaded here -->
          <p style="text-align: center">載入中...</p>
        </div>

        <script>
          document.addEventListener("DOMContentLoaded", function () {
            fetch("data.json")
              .then((response) => response.json())
              .then((data) => {
                const list = document.getElementById("rewards-list");
                list.innerHTML = ""; // Clear loading text

                if (!data.rewards || data.rewards.length === 0) {
                  list.innerHTML = `
                                    <p style="text-align: center; padding: 40px 0; font-size: 1.2em; color: #666;">
                                        🎁 2026 年集章獎勵活動規劃中...<br><br>
                                        敬請期待！
                                    </p>
                                `;
                  return;
                }

                data.rewards.forEach((item) => {
                  const li = document.createElement("div");
                  li.className = "communityItem";
                  li.innerHTML = `
                                    <a href="${item.link}" target="_blank">
                                        <img src="${item.logo}" alt="${item.name}">
                                    </a>
                                    <a class="communityItemTitle" href="${item.link}" target="_blank">${item.name}</a>
                                    <div class="description">${item.description}</div>
                                `;
                  list.appendChild(li);
                });
              })
              .catch((error) => {
                console.error("Error loading data:", error);
                document.getElementById("rewards-list").innerHTML =
                  '<p style="text-align: center; color: red;">無法載入資料</p>';
              });
          });
        </script>
      </div>
    </div>
  </body>
